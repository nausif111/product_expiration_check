{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center h-screen bg-gray-50">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96 border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4 text-sm">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="flex flex-col gap-4">
            <div class="flex flex-col">
                <label class="text-sm font-semibold text-gray-600 mb-1">Username</label>
                <input type="text" name="username" required
                    class="border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <div class="flex flex-col">
                <label class="text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required
                    class="border border-gray-300 p-2 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
            </div>
            <button type="submit"
                class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-lg mt-2 transition shadow-md">
                Sign In
            </button>
        </form>
        <p class="text-xs text-center text-gray-400 mt-6 italic">Default: admin / password123</p>
    </div>
</div>
{% endblock %}

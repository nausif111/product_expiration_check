<div class="flex items-center justify-center h-screen mt-20">
    <form action="/add_product" method="POST" class="flex h-screen flex-col gap-4">
        <div class="flex flex-col">
            <label class="text-sm font-bold mb-1">Product Name</label>
            <input type="text" name="name" required
                class="border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        <div class="flex flex-col">
            <label class="text-sm font-bold mb-1">Expiration Date</label>
            <input type="date" name="expiry" required
                class="border p-2 rounded focus:ring-2 focus:ring-green-500 outline-none">
        </div>
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded font-bold transition">
            Add Product
        </button>
    </form>
</div>
{% endblock %}
